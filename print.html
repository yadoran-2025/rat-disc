<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
    <title>인쇄용 페이지</title>
    <link rel="stylesheet" href="https://yadoran-2025.github.io/booong-design-system/releases/v2.0.0/booong.css">
    <link rel="stylesheet" href="css/print.css">
</head>
<body>
    <div class="print-toolbar-wrap no-print" aria-label="인쇄 미리보기 도구">
        <div class="print-toolbar">
            <a class="back-btn" href="index.html">
                <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M9 2L4 7l5 5"></path></svg>
                대시보드
            </a>
            <div class="print-context" aria-live="polite">
                <span class="print-context__title" id="print-context-title">기출문제</span>
                <span class="print-context__sep">·</span>
                <span class="print-context__count" id="print-context-count">문제 0개</span>
            </div>
            <div class="print-page-nav">
                <span class="print-page-nav__text" id="print-page-status">0 / 0 페이지</span>
                <button class="print-nav-btn" type="button" id="print-prev-page" aria-label="이전 페이지">
                    <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M8 2L4 6l4 4"></path></svg>
                </button>
                <button class="print-nav-btn" type="button" id="print-next-page" aria-label="다음 페이지">
                    <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M4 2l4 4-4 4"></path></svg>
                </button>
            </div>
            <button class="print-action-btn" type="button" onclick="window.print()">
                <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                인쇄
            </button>
        </div>
    </div>

    <!-- JS가 여기에 .page-content들을 생성하여 주입합니다 -->
    <div id="print-root"></div>

    <script type="module" src="js/visitor-tracker.js"></script>
    <script src="js/print.js"></script>
</body>
</html>
